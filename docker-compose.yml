version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: holidays-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: holidays_db
      MYSQL_USER: holidays_user
      MYSQL_PASSWORD: holidays_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "holidays_user", "-pholidays_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: holidays-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/holidays_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: holidays_user
      SPRING_DATASOURCE_PASSWORD: holidays_pass
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
