spring.application.name=federal-holidays-api

spring.datasource.url=jdbc:mysql://localhost:3306/holidays_db?useSSL=false&serverTimezone=EST&allowPublicKeyRetrieval=true
spring.datasource.username=holidays_user
spring.datasource.password=holidays_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
